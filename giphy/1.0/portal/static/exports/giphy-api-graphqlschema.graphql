input GetGifsByIdInput {
    "Filters results by specified GIF IDs, separated by commas."
    ids: String!
    apiKey: String!
}

input GetRandomgifInput {
    "Filters results by specified tag."
    tag: String!
    "Filters results by specified rating."
    rating: String!
    apiKey: String!
}

input SearchGifsInput {
    "Search query term or prhase."
    q: String!
    "The maximum number of records to return."
    limit: Int!
    "An optional results offset."
    offset: Int!
    "Filters results by specified rating."
    rating: String!
    "Specify default language for regional content; use a 2-letter ISO 639-1 language code."
    lang: String!
    apiKey: String!
}

input GetTranslategifInput {
    "Search term."
    s: String!
    apiKey: String!
}

input GetTrendinggifsInput {
    "The maximum number of records to return."
    limit: Int!
    "An optional results offset."
    offset: Int!
    "Filters results by specified rating."
    rating: String!
    apiKey: String!
}

input GetGifByIdInput {
    "Filters results by specified GIF ID."
    gifId: Int!
    apiKey: String!
}

input GetRandomstickerInput {
    "Filters results by specified tag."
    tag: String!
    "Filters results by specified rating."
    rating: String!
    apiKey: String!
}

input SearchStickersInput {
    "Search query term or prhase."
    q: String!
    "The maximum number of records to return."
    limit: Int!
    "An optional results offset."
    offset: Int!
    "Filters results by specified rating."
    rating: String!
    "Specify default language for regional content; use a 2-letter ISO 639-1 language code."
    lang: String!
    apiKey: String!
}

input GetTranslatestickerInput {
    "Search term."
    s: String!
    apiKey: String!
}

input GetTrendingstickersInput {
    "The maximum number of records to return."
    limit: Int!
    "An optional results offset."
    offset: Int!
    "Filters results by specified rating."
    rating: String!
    apiKey: String!
}

type Query {
    "A multiget version of the get GIF by ID endpoint."
    getGifsById(input: GetGifsByIdInput!): GifsResponse!
    "Returns a random GIF, limited by tag. Excluding the tag parameter will return a random GIF from the GIPHY catalog."
    getRandomgif(input: GetRandomgifInput!): GifsRandomResponse!
    "Search all GIPHY GIFs for a word or phrase. Punctuation will be stripped and ignored.  Use a plus or url encode for phrases. Example paul+rudd, ryan+gosling or american+psycho."
    searchGifs(input: SearchGifsInput!): GifsSearchResponse!
    "The translate API draws on search, but uses the GIPHY `special sauce` to handle translating from one vocabulary to another. In this case, words and phrases to GIF"
    getTranslategif(input: GetTranslategifInput!): GifsTranslateResponse!
    "Fetch GIFs currently trending online. Hand curated by the GIPHY editorial team.  The data returned mirrors the GIFs showcased on the GIPHY homepage. Returns 25 results by default."
    getTrendinggifs(input: GetTrendinggifsInput!): GifsTrendingResponse!
    "Returns a GIF given that GIF's unique ID"
    getGifById(input: GetGifByIdInput!): GifsResponse1!
    "Returns a random GIF, limited by tag. Excluding the tag parameter will return a random GIF from the GIPHY catalog."
    getRandomsticker(input: GetRandomstickerInput!): StickersRandomResponse!
    "Replicates the functionality and requirements of the classic GIPHY search, but returns animated stickers rather than GIFs."
    searchStickers(input: SearchStickersInput!): StickersSearchResponse!
    "The translate API draws on search, but uses the GIPHY `special sauce` to handle translating from one vocabulary to another. In this case, words and phrases to GIFs."
    getTranslatesticker(input: GetTranslatestickerInput!): StickersTranslateResponse!
    "Fetch Stickers currently trending online. Hand curated by the GIPHY editorial team. Returns 25 results by default."
    getTrendingstickers(input: GetTrendingstickersInput!): StickersTrendingResponse!
}

type Mutation {
    _: Boolean
}

schema {
    mutation: Mutation
    query: Query
}

    Backups are automatically created daily.
- name: Enable Rescue Mode for a Server
  method: POST
  url: https://api.hetzner.cloud/v1/servers/{id}/actions/enable_rescue
  body:
    mimeType: application/json
    text: >-
      {
        "ssh_keys": [
          2323
        ],
        "type": "linux64"
      }

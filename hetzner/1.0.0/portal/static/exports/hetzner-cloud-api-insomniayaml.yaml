- name: Get Metrics for a Server
  method: GET
  url: https://api.hetzner.cloud/v1/servers/{id}/metrics
  parameters:
  - name: type
    value: cpu
    disabled: false
  - name: start
    value: start5
    disabled: false
  - name: end
    value: end24
    disabled: false
  - name: step
    value: step50

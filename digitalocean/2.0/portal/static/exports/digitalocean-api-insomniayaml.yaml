resources:
- name: DigitalOcean API
  _type: workspace
  _id: wrk_a0ac718b171f45d8a0e9bd7c2d05bb37
  description: "# Introduction\n\nThe DigitalOcean API allows you to manage Droplets and resources within the\nDigitalOcean cloud in a simple, programmatic way using conventional HTTP requests.\n\nAll of the functionality that you are familiar with in the DigitalOcean\ncontrol panel is also available through the API, allowing you to script the\ncomplex actions that your situation requires.\n\nThe API documentation will start with a general overview about the design\nand technology that has been implemented, followed by reference information\nabout specific endpoints.\n\n## Requests\n\nAny tool that is fluent in HTTP can communicate with the API simply by\nrequesting the correct URI. Requests should be made using the HTTPS protocol\nso that traffic is encrypted. The interface responds to different methods\ndepending on the action required.\n\n|Method|Usage|\n|--- |--- |\n|GET|For simple retrieval of information about your account, Droplets, or environment, you should use the GET method.  The information you request will be returned to you as a JSON object. The attributes defined by the JSON object can be used to form additional requests.  Any request using the GET method is read-only and will not affect any of the objects you are querying.|\n|DELETE|To destroy a resource and remove it from your account and environment, the DELETE method should be used.  This will remove the specified object if it is found.  If it is not found, the operation will return a response indicating that the object was not found. This idempotency means that you do not have to check for a resource's availability prior to issuing a delete command, the final state will be the same regardless of its existence.|\n|PUT|To update the information about a resource in your account, the PUT method is available. Like the DELETE Method, the PUT method is idempotent.  It sets the state of the target using the provided values, regardless of their current values. Requests using the PUT method do not need to check the current attributes of the object.|\n|PATCH|Some resources support partial modification. In these cases, the PATCH method is available. Unlike PUT which generally requires a complete representation of a resource, a PATCH request is is a set of instructions on how to modify a resource updating only specific attributes.|\n|POST|To create a new object, your request should specify the POST method. The POST request includes all of the attributes necessary to create a new object.  When you wish to create a new object, send a POST request to the target endpoint.|\n|HEAD|Finally, to retrieve metadata information, you should use the HEAD method to get the headers.  This returns only the header of what would be returned with an associated GET request. Response headers contain some useful information about your API access and the results that are available for your request. For instance, the headers contain your current rate-limit value and the amount of time available until the limit resets. It also contains metrics about the total number of objects found, pagination information, and the total content length.|\n\n\n## HTTP Statuses\n\nAlong with the HTTP methods that the API responds to, it will also return\nstandard HTTP statuses, including error codes.\n\nIn the event of a problem, the status will contain the error code, while the\nbody of the response will usually contain additional information about the\nproblem that was encountered.\n\nIn general, if the status returned is in the 200 range, it indicates that\nthe request was fulfilled successfully and that no error was encountered.\n\nReturn codes in the 400 range typically indicate that there was an issue\nwith the request that was sent. Among other things, this could mean that you\ndid not authenticate correctly, that you are requesting an action that you\ndo not have authorization for, that the object you are requesting does not\nexist, or that your request is malformed.\n\nIf you receive a status in the 500 range, this generally indicates a\nserver-side problem. This means that we are having an issue on our end and\ncannot fulfill your request currently.\n\n400 and 500 level error responses will include a JSON object in their body,\nincluding the following attributes:\n\n|Name|Type|Description|\n|--- |--- |--- |\n|id|string|A short identifier corresponding to the HTTP status code returned. For example, the ID for a response returning a 404 status code would be \"not_found.\"|\n|message|string|A message providing additional information about the error, including details to help resolve it when possible.|\n|request_id|string|Optionally, some endpoints may include a request ID that should be provided when reporting bugs or opening support tickets to help identify the issue.|\n\n### Example Error Response\n\n```\n    HTTP/1.1 403 Forbidden\n    {\n      \"id\":       \"forbidden\",\n      \"message\":  \"You do not have access for the attempted action.\"\n    }\n```\n\n## Responses\n\nWhen a request is successful, a response body will typically be sent back in\nthe form of a JSON object. An exception to this is when a DELETE request is\nprocessed, which will result in a successful HTTP 204 status and an empty\nresponse body.\n\nInside of this JSON object, the resource root that was the target of the\nrequest will be set as the key. This will be the singular form of the word\nif the request operated on a single object, and the plural form of the word\nif a collection was processed.\n\nFor example, if you send a GET request to `/v2/droplets/$DROPLET_ID` you\nwill get back an object with a key called \"`droplet`\". However, if you send\nthe GET request to the general collection at `/v2/droplets`, you will get\nback an object with a key called \"`droplets`\".\n\nThe value of these keys will generally be a JSON object for a request on a\nsingle object and an array of objects for a request on a collection of\nobjects.\n\n### Response for a Single Object\n\n```\n    {\n        \"droplet\": {\n            \"name\": \"example.com\"\n            . . .\n        }\n    }\n```\n\n### Response for an Object Collection\n\n```\n    {\n        \"droplets\": [\n            {\n                \"name\": \"example.com\"\n                . . .\n            },\n            {\n                \"name\": \"second.com\"\n                . . .\n            }\n        ]\n    }\n```\n\n## Meta\n\nIn addition to the main resource root, the response may also contain a\n`meta` object. This object contains information about the response itself.\n\nThe `meta` object contains a `total` key that is set to the total number of\nobjects returned by the request. This has implications on the `links` object\nand pagination.\n\nThe `meta` object will only be displayed when it has a value. Currently, the\n`meta` object will have a value when a request is made on a collection (like\n`droplets` or `domains`).\n\n\n### Sample Meta Object\n\n```\n    {\n        . . .\n        \"meta\": {\n            \"total\": 43\n        }\n        . . .\n    }\n```\n\n## Links & Pagination\n\nThe `links` object is returned as part of the response body when pagination\nis enabled. By default, 20 objects are returned per page. If the response\ncontains 20 objects or fewer, no `links` object will be returned. If the\nresponse contains more than 20 objects, the first 20 will be returned along\nwith the `links` object.\n\nYou can request a different pagination limit or force pagination by\nappending `?per_page=` to the request with the number of items you would\nlike per page. For instance, to show only two results per page, you could\nadd `?per_page=2` to the end of your query. The maximum number of results\nper page is 200.\n\nThe `links` object contains a `pages` object. The `pages` object, in turn,\ncontains keys indicating the relationship of additional pages. The values of\nthese are the URLs of the associated pages. The keys will be one of the\nfollowing:\n\n*   **first**: The URI of the first page of results.\n*   **prev**: The URI of the previous sequential page of results.\n*   **next**: The URI of the next sequential page of results.\n*   **last**: The URI of the last page of results.\n\nThe `pages` object will only include the links that make sense. So for the\nfirst page of results, no `first` or `prev` links will ever be set. This\nconvention holds true in other situations where a link would not make sense.\n\n### Sample Links Object\n\n```\n    {\n        . . .\n        \"links\": {\n            \"pages\": {\n                \"last\": \"https://api.digitalocean.com/v2/images?page=2\",\n                \"next\": \"https://api.digitalocean.com/v2/images?page=2\"\n            }\n        }\n        . . .\n    }\n```\n\n## Rate Limit\n\nRequests through the API are rate limited per OAuth token. Current rate limits:\n\n*   5,000 requests per hour\n*   250 requests per minute (5% of the hourly total)\n\nOnce you exceed either limit, you will be rate limited until the next cycle\nstarts. Space out any requests that you would otherwise issue in bursts for\nthe best results.\n\nThe rate limiting information is contained within the response headers of\neach request. The relevant headers are:\n\n*   **ratelimit-limit**: The number of requests that can be made per hour.\n*   **ratelimit-remaining**: The number of requests that remain before you hit your request limit. See the information below for how the request limits expire.\n*   **ratelimit-reset**: This represents the time when the oldest request will expire. The value is given in [Unix epoch time](http://en.wikipedia.org/wiki/Unix_time). See below for more information about how request limits expire.\n\nAs long as the `ratelimit-remaining` count is above zero, you will be able\nto make additional requests.\n\nThe way that a request expires and is removed from the current limit count\nis important to understand. Rather than counting all of the requests for an\nhour and resetting the `ratelimit-remaining` value at the end of the hour,\neach request instead has its own timer.\n\nThis means that each request contributes toward the `ratelimit-remaining`\ncount for one complete hour after the request is made. When that request's\ntimer runs out, it is no longer counted towards the request limit.\n\nThis has implications on the meaning of the `ratelimit-reset` header as\nwell. Because the entire rate limit is not reset at one time, the value of\nthis header is set to the time when the _oldest_ request will expire.\n\nKeep this in mind if you see your `ratelimit-reset` value change, but not\nmove an entire hour into the future.\n\nIf the `ratelimit-remaining` reaches zero, subsequent requests will receive\na 429 error code until the request reset has been reached. You can see the\nformat of the response in the examples.\n\n**Note:** The following endpoints have special rate limit requirements that\nare independent of the limits defined above.\n\n*   Only 12 `POST` requests to the `/v2/floating_ips` endpoint to create Floating IPs can be made per 60 seconds.\n*   Only 10 `GET` requests to the `/v2/account/keys` endpoint to list SSH keys can be made per 60 seconds.\n*   Only 5 requests to any and all `v2/cdn/endpoints` can be made per 10 seconds. This includes `v2/cdn/endpoints`, \n    `v2/cdn/endpoints/$ENDPOINT_ID`, and `v2/cdn/endpoints/$ENDPOINT_ID/cache`.\n*   Only 50 strings within the `files` json struct in the `v2/cdn/endpoints/$ENDPOINT_ID/cache` [payload](https://docs.digitalocean.com/reference/api/api-reference/#operation/cdn_purge_cache) \n    can be requested every 20 seconds.\n\n### Sample Rate Limit Headers\n\n```\n    . . .\n    ratelimit-limit: 1200\n    ratelimit-remaining: 1193\n    rateLimit-reset: 1402425459\n    . . .\n```\n\n### Sample Rate Exceeded Response\n\n```\n    429 Too Many Requests\n    {\n            id: \"too_many_requests\",\n            message: \"API Rate limit exceeded.\"\n    }\n```\n\n## Curl Examples\n\nThroughout this document, some example API requests will be given using the\n`curl` command. This will allow us to demonstrate the various endpoints in a\nsimple, textual format.\n  \n  These examples assume that you are using a Linux or macOS command line. To run\nthese commands on a Windows machine, you can either use cmd.exe, PowerShell, or WSL:\n\n* For cmd.exe, use the `set VAR=VALUE` [syntax](https://docs.microsoft.com/en-us/windows-server/administration/windows-commands/set_1)\nto define environment variables, call them with `%VAR%`, then replace all backslashes (`\\`) in the examples with carets (`^`).\n\n* For PowerShell, use the `$Env:VAR = \"VALUE\"` [syntax](https://docs.microsoft.com/en-us/powershell/module/microsoft.powershell.core/about/about_environment_variables?view=powershell-7.2)\nto define environment variables, call them with `$Env:VAR`, then replace `curl` with `curl.exe` and all backslashes (`\\`) in the examples with backticks (`` ` ``).\n\n* WSL is a compatibility layer that allows you to emulate a Linux terminal on a Windows machine.\nInstall WSL with our [community tutorial](https://www.digitalocean.com/community/tutorials/how-to-install-the-windows-subsystem-for-linux-2-on-microsoft-windows-10), \nthen follow this API documentation normally.\n\nThe names of account-specific references (like Droplet IDs, for instance)\nwill be represented by variables. For instance, a Droplet ID may be\nrepresented by a variable called `$DROPLET_ID`. You can set the associated\nvariables in your environment if you wish to use the examples without\nmodification.\n\nThe first variable that you should set to get started is your OAuth\nauthorization token. The next section will go over the details of this, but\nyou can set an environmental variable for it now.\n\nGenerate a token by going to the [Apps & API](https://cloud.digitalocean.com/settings/applications)\nsection of the DigitalOcean control panel. Use an existing token if you have\nsaved one, or generate a new token with the \"Generate new token\" button.\nCopy the generated token and use it to set and export the TOKEN variable in\nyour environment as the example shows.\n\nYou may also wish to set some other variables now or as you go along. For\nexample, you may wish to set the `DROPLET_ID` variable to one of your\nDroplet IDs since this will be used frequently in the API.\n\nIf you are following along, make sure you use a Droplet ID that you control\nso that your commands will execute correctly.\n\nIf you need access to the headers of a response through `curl`, you can pass\nthe `-i` flag to display the header information along with the body. If you\nare only interested in the header, you can instead pass the `-I` flag, which\nwill exclude the response body entirely.\n\n\n### Set and Export your OAuth Token\n\n```\nexport DIGITALOCEAN_TOKEN=your_token_here\n```\n\n### Set and Export a Variable\n\n```\nexport DROPLET_ID=1111111\n```\n\n## Parameters\n\nThere are two different ways to pass parameters in a request with the API.\n\nWhen passing parameters to create or update an object, parameters should be\npassed as a JSON object containing the appropriate attribute names and\nvalues as key-value pairs. When you use this format, you should specify that\nyou are sending a JSON object in the header. This is done by setting the\n`Content-Type` header to `application/json`. This ensures that your request\nis interpreted correctly.\n\nWhen passing parameters to filter a response on GET requests, parameters can\nbe passed using standard query attributes. In this case, the parameters\nwould be embedded into the URI itself by appending a `?` to the end of the\nURI and then setting each attribute with an equal sign. Attributes can be\nseparated with a `&`. Tools like `curl` can create the appropriate URI when\ngiven parameters and values; this can also be done using the `-F` flag and\nthen passing the key and value as an argument. The argument should take the\nform of a quoted string with the attribute being set to a value with an\nequal sign.\n\n### Pass Parameters as a JSON Object\n\n```\n    curl -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n        -H \"Content-Type: application/json\" \\\n        -d '{\"name\": \"example.com\", \"ip_address\": \"127.0.0.1\"}' \\\n        -X POST \"https://api.digitalocean.com/v2/domains\"\n```\n\n### Pass Filter Parameters as a Query String\n\n```\n     curl -H \"Authorization: Bearer $DIGITALOCEAN_TOKEN\" \\\n         -X GET \\\n         \"https://api.digitalocean.com/v2/images?private=true\"\n```\n\n## Cross Origin Resource Sharing\n\nIn order to make requests to the API from other domains, the API implements\nCross Origin Resource Sharing (CORS) support.\n\nCORS support is generally used to create AJAX requests outside of the domain\nthat the request originated from. This is necessary to implement projects\nlike control panels utilizing the API. This tells the browser that it can\nsend requests to an outside domain.\n\nThe procedure that the browser initiates in order to perform these actions\n(other than GET requests) begins by sending a \"preflight\" request. This sets\nthe `Origin` header and uses the `OPTIONS` method. The server will reply\nback with the methods it allows and some of the limits it imposes. The\nclient then sends the actual request if it falls within the allowed\nconstraints.\n\nThis process is usually done in the background by the browser, but you can\nuse curl to emulate this process using the example provided. The headers\nthat will be set to show the constraints are:\n\n*   **Access-Control-Allow-Origin**: This is the domain that is sent by the client or browser as the origin of the request. It is set through an `Origin` header.\n*   **Access-Control-Allow-Methods**: This specifies the allowed options for requests from that domain. This will generally be all available methods.\n*   **Access-Control-Expose-Headers**: This will contain the headers that will be available to requests from the origin domain.\n*   **Access-Control-Max-Age**: This is the length of time that the access is considered valid. After this expires, a new preflight should be sent.\n*   **Access-Control-Allow-Credentials**: This will be set to `true`. It basically allows you to send your OAuth token for authentication.\n\nYou should not need to be concerned with the details of these headers,\nbecause the browser will typically do all of the work for you.\n"
- name: 1-Click Applications
  _type: request_group
  _id: fld_ee7d932256f04900a0a32effe8de908a
  parentId: wrk_a0ac718b171f45d8a0e9bd7c2d05bb37
  description: >-
    1-Click applications are pre-built Droplet images or Kubernetes apps with software,

    features, and configuration details already set up for you. They can be found in the

    [DigitalOcean Marketplace](https://www.digitalocean.com/docs/marketplace).
- name: Account
  _type: request_group
  _id: fld_dc26ed3e3b654d5d9fb28853613779ee
  parentId: wrk_a0ac718b171f45d8a0e9bd7c2d05bb37
  description: Provides information about your current account.
- name: Actions
  _type: request_group
  _id: fld_0daf2674aa6c479aaf10826ba872703f
  parentId: wrk_a0ac718b171f45d8a0e9bd7c2d05bb37
  description: >-
    Actions are records of events that have occurred on the resources in your account.

    These can be things like rebooting a Droplet, or transferring an image to a new region.


    An action object is created every time one of these actions is initiated. The action

    object contains information about the current status of the action, start and complete

    timestamps, and the associated resource type and ID.


    Every action that creates an action object is available through this endpoint. Completed

    actions are not removed from this list and are always available for querying.


    **Note:** You can pass the following HTTP header with the request to have the API return

    the `reserved_ips` stanza instead of the `floating_ips` stanza:


    - `Accept: application/vnd.digitalocean.reserveip+json`
- name: Apps
  _type: request_group
  _id: fld_a175a87c783e40c0be6aa35cd759d323
  parentId: wrk_a0ac718b171f45d8a0e9bd7c2d05bb37
  description: >-
    App Platform is a Platform-as-a-Service (PaaS) offering from DigitalOcean that allows

    developers to publish code directly to DigitalOcean servers without worrying about the

    underlying infrastructure.


    Most API operations are centered around a few core object types. Following are the

    definitions of these types. These definitions will be omitted from the operation-specific

    documentation.


    For documentation on app specifications (`AppSpec` objects), please refer to the

    [product documentation](https://docs.digitalocean.com/products/app-platform/reference/app-spec/)).
- name: Billing
  _type: request_group
  _id: fld_088f9a099ee6479ba97e0e1b9e3e1c74
  parentId: wrk_a0ac718b171f45d8a0e9bd7c2d05bb37
  description: >-
    The billing endpoints allow you to retrieve your account balance, invoices

    and billing history.


    **Balance:** By sending requests to the `/v2/customers/my/balance` endpoint, you can

    retrieve the balance information for the requested customer account.


    **Invoices:** [Invoices](https://www.digitalocean.com/docs/accounts/billing/invoices/)

    are generated on the first of each month for every DigitalOcean

    customer. An invoice preview is generated daily, which can be accessed

    with the `preview` keyword in place of `$INVOICE_UUID`. To interact with

    invoices, you will generally send requests to the invoices endpoint at

    `/v2/customers/my/invoices`.


    **Billing History:** Billing history is a record of billing events for your account.

    For example, entries may include events like payments made, invoices

    issued, or credits granted. To interact with invoices, you

    will generally send requests to the invoices endpoint at

    `/v2/customers/my/billing_history`.
- name: Block Storage
  _type: request_group
  _id: fld_128540e4b4264306877eaa1eb05a3b71
  parentId: wrk_a0ac718b171f45d8a0e9bd7c2d05bb37
  description: >-
    [DigitalOcean Block Storage Volumes](https://www.digitalocean.com/docs/volumes/)

    provide expanded storage capacity for your Droplets and can be moved

    between Droplets within a specific region.


    Volumes function as raw block devices, meaning they appear to the

    operating system as locally attached storage which can be formatted using

    any file system supported by the OS. They may be created in sizes from

    1GiB to 16TiB.


    By sending requests to the `/v2/volumes` endpoint, you can list, create, or

    delete volumes as well as attach and detach them from Droplets
- name: Block Storage Actions
  _type: request_group
  _id: fld_8d2a782c8eec41e2870800b960c0bf1c
  parentId: wrk_a0ac718b171f45d8a0e9bd7c2d05bb37
  description: >-
    Block storage actions are commands that can be given to a DigitalOcean

    Block Storage Volume. An example would be detaching or attaching a volume

    from a Droplet. These requests are made on the

    `/v2/volumes/$VOLUME_ID/actions` endpoint.


    An action object is returned. These objects hold the current status of the

    requested action.
- name: CDN Endpoints
  _type: request_group
  _id: fld_dae5a58adf644528b461613f5d219461
  parentId: wrk_a0ac718b171f45d8a0e9bd7c2d05bb37
  description: >-
    Content hosted in DigitalOcean's object storage solution,

    [Spaces](https://www.digitalocean.com/docs/spaces/overview/),

    can optionally be served by our globally distributed Content Delivery

    Network (CDN). By sending requests to `/v2/cdn/endpoints`, you can list,

    create, or delete CDN Endpoints as well as purge cached content. To use a

    custom subdomain to access the CDN Endpoint, provide the ID of a

    DigitalOcean managed TLS certificate and the fully qualified domain name

    for the custom subdomain.
- name: Certificates
  _type: request_group
  _id: fld_0759800743c44e75beb571c5e9b75616
  parentId: wrk_a0ac718b171f45d8a0e9bd7c2d05bb37
  description: >-
    In order to perform SSL termination on load balancers, DigitalOcean offers

    two types of [SSL certificate management](https://www.digitalocean.com/docs/accounts/security/#certificates):


    * **Custom**: User-generated certificates may be uploaded to DigitalOcean

    where they will be placed in a fully encrypted and isolated storage system.


    * **Let's Encrypt**: Certificates may be automatically generated by

    DigitalOcean utilizing an integration with Let's Encrypt, the free and

    open certificate authority. These certificates will also be automatically

    renewed as required.
- name: Container Registry
  _type: request_group
  _id: fld_abbc661835504b44bae2b9d24b73ca80
  parentId: wrk_a0ac718b171f45d8a0e9bd7c2d05bb37
  description: >-
    DigitalOcean offers the ability for you to create a

    [private container registry](https://www.digitalocean.com/docs/images/container-registry/quickstart/)

    to store your Docker images for use with your Kubernetes clusters. This

    container registry runs inside the same datacenters as your cluster,

    ensuring reliable and performant rollout of image deployments.


    You can only create one registry per DigitalOcean account, but you can use

    that registry to create as many repositories as you wish.
- name: Databases
  _type: request_group
  _id: fld_a21c6454bba34df8921d6537f9a08dbb
  parentId: wrk_a0ac718b171f45d8a0e9bd7c2d05bb37
  description: >-
    DigitalOcean's [managed database service](https://www.digitalocean.com/docs/databases)

    simplifies the creation and management of highly available database clusters. Currently, it

    offers support for [PostgreSQL](http://www.digitalocean.com/docs/databases/postgresql/),

    [Redis](https://www.digitalocean.com/docs/databases/redis/),

    [MySQL](https://www.digitalocean.com/docs/databases/mysql/), and

    [MongoDB](https://www.digitalocean.com/docs/databases/mongodb/).


    By sending requests to the `/v2/databases` endpoint, you can list, create, or delete

    database clusters as well as scale the size of a cluster, add or remove read-only replicas,

    and manage other configuration details.


    Database clusters may be deployed in a multi-node, high-availability configuration.

    If your machine type is above the basic nodes, your node plan is above the smallest option,

    or you are running MongoDB, you may additionally include up to two standby nodes in your cluster.


    The size of individual nodes in a database cluster is represented by a human-readable slug,

    which is used in some of the following requests. Each slug denotes the node's identifier,

    CPU count, and amount of RAM, in that order.


    For **Basic nodes**, reference the following table for its slug:


    Slug               | CPU     | RAM

    -------------------|---------|---------

    db-s-1vcpu-1gb     | 1 vCPU  | 1 GB

    db-s-1vcpu-2gb     | 1 vCPU  | 2 GB

    db-s-2vcpu-4gb     | 2 vCPU  | 4 GB

    db-s-4vcpu-8gb     | 4 vCPU  | 8 GB

    db-s-6vcpu-16gb    | 6 vCPU  | 16 GB

    db-s-8vcpu-32gb    | 8 vCPU  | 32 GB

    db-s-16vcpu-64gb   | 16 vCPU | 64 GB


    For **General Purpose nodes**, reference the following table for its slug:


    Slug               | CPU     | RAM

    -------------------|---------|---------

    gd-2vcpu-8gb       | 2 vCPU  | 8 GB

    gd-4vcpu-16gb      | 4 vCPU  | 16 GB

    gd-8vcpu-32gb      | 8 vCPU  | 32 GB

    gd-16vcpu-64gb     | 16 vCPU | 64 GB

    gd-32vcpu-128gb    | 32 vCPU | 128 GB

    gd-40vcpu-160gb    | 40 vCPU | 160 GB


    For **Storage-Optimized nodes**, reference the following table for its slug:


    Slug               | CPU     | RAM

    -------------------|---------|---------

    so1_5-2vcpu-16gb   | 2 vCPU  | 16 GB

    so1_5-4vcpu-32gb   | 4 vCPU  | 32 GB

    so1_5-8vcpu-64gb   | 8 vCPU  | 64 GB

    so1_5-16vcpu-128gb | 16 vCPU | 128 GB

    so1_5-24vcpu-192gb | 24 vCPU | 192 GB

    so1_5-32vcpu-256gb | 32 vCPU | 256 GB


    For **Memory-Optimized nodes**, reference the following table for its slug:


    Slug               | CPU     | RAM

    -------------------|---------|---------

    m-2vcpu-16gb       | 2 vCPU  | 16 GB

    m-4vcpu-32gb       | 4 vCPU  | 32 GB

    m-8vcpu-64gb       | 8 vCPU  | 64 GB

    m-16vcpu-128gb     | 16 vCPU | 128 GB

    m-24vcpu-192gb     | 24 vCPU | 192 GB

    m-32vcpu-256gb     | 32 vCPU | 256 GB
- name: Domain Records
  _type: request_group
  _id: fld_a1c2a46c66b44c2797c9cb92a036961c
  parentId: wrk_a0ac718b171f45d8a0e9bd7c2d05bb37
  description: >-
    Domain record resources are used to set or retrieve information about the

    individual DNS records configured for a domain. This allows you to build

    and manage DNS zone files by adding and modifying individual records for a

    domain.


    The [DigitalOcean DNS management interface](https://www.digitalocean.com/docs/networking/dns/)

    allows you to configure the following DNS records:


    Name  | Description                                                                                                                                        |

    ------|----------------------------------------------------------------------------------------------------------------------------------------------------|

    A     | This record type is used to map an IPv4 address to a hostname.                                                                                     |

    AAAA  | This record type is used to map an IPv6 address to a hostname.                                                                                     |

    CAA   | As specified in RFC-6844, this record type can be used to restrict which certificate authorities are permitted to issue certificates for a domain. |

    CNAME | This record type defines an alias for your canonical hostname (the one defined by an A or AAAA record).                                            |

    MX    | This record type is used to define the mail exchanges used for the domain.                                                                         |

    NS    | This record type defines the name servers that are used for this zone.                                                                             |

    TXT   | This record type is used to associate a string of text with a hostname, primarily used for verification.                                           |

    SRV   | This record type specifies the location (hostname and port number) of servers for specific services.                                               |

    SOA   | This record type defines administrative information about the zone. Can only have ttl changed, cannot be deleted                                   |
- name: Domains
  _type: request_group
  _id: fld_cd6c9201acac460c93d8a6f282b20bdc
  parentId: wrk_a0ac718b171f45d8a0e9bd7c2d05bb37
  description: >-
    Domain resources are domain names that you have purchased from a domain

    name registrar that you are managing through the

    [DigitalOcean DNS interface](https://www.digitalocean.com/docs/networking/dns/).


    This resource establishes top-level control over each domain. Actions that

    affect individual domain records should be taken on the

    [Domain Records](#tag/Domain-Records) resource.
- name: Droplet Actions
  _type: request_group
  _id: fld_4fe0b8fc4a094034bd0306016df51804
  parentId: wrk_a0ac718b171f45d8a0e9bd7c2d05bb37
  description: >-
    Droplet actions are tasks that can be executed on a Droplet. These can be

    things like rebooting, resizing, snapshotting, etc.


    Droplet action requests are generally targeted at one of the "actions"

    endpoints for a specific Droplet. The specific actions are usually

    initiated by sending a POST request with the action and arguments as

    parameters.


    Droplet action requests create a Droplet actions object, which can be used

    to get information about the status of an action. Creating a Droplet

    action is asynchronous: the HTTP call will return the action object before

    the action has finished processing on the Droplet. The current status of

    an action can be retrieved from either the Droplet actions endpoint or the

    global actions endpoint. If a Droplet action is uncompleted it may block

    the creation of a subsequent action for that Droplet, the locked attribute

    of the Droplet will be true and attempts to create a Droplet action will

    fail with a status of 422.
- name: Droplets
  _type: request_group
  _id: fld_c11d00137a12407386ad52659ab8e639
  parentId: wrk_a0ac718b171f45d8a0e9bd7c2d05bb37
  description: >-
    A [Droplet](https://www.digitalocean.com/docs/droplets/) is a DigitalOcean

    virtual machine. By sending requests to the Droplet endpoint, you can

    list, create, or delete Droplets.


    Some of the attributes will have an object value. The `region` and `image`

    objects will all contain the standard attributes of their associated

    types. Find more information about each of these objects in their

    respective sections.
- name: Firewalls
  _type: request_group
  _id: fld_1dd56f5521184197aec0f4989d16e9c3
  parentId: wrk_a0ac718b171f45d8a0e9bd7c2d05bb37
  description: >-
    [DigitalOcean Cloud Firewalls](https://www.digitalocean.com/docs/networking/firewalls/)

    provide the ability to restrict network access to and from a Droplet

    allowing you to define which ports will accept inbound or outbound

    connections. By sending requests to the `/v2/firewalls` endpoint, you can

    list, create, or delete firewalls as well as modify access rules.
- name: Floating IP Actions
  _type: request_group
  _id: fld_d58cf12243ba4918a0c96d37557e929b
  parentId: wrk_a0ac718b171f45d8a0e9bd7c2d05bb37
  description: >-
    As of 16 June 2022, we have renamed the Floating IP product to [Reserved IPs](https://docs.digitalocean.com/reference/api/api-reference/#tag/Reserved-IPs).

    The Reserved IP product's endpoints function the exact same way as Floating IPs.

    The only difference is the name change throughout the URLs and fields.

    For example, the `floating_ips` field is now the `reserved_ips` field.

    The Floating IP endpoints will remain active until fall 2023 before being

    permanently deprecated.


    With the exception of the [Projects API](https://docs.digitalocean.com/reference/api/api-reference/#tag/Projects),

    we will reflect this change as an additional field in the responses across the API

    where the `floating_ip` field is used. For example, the Droplet metadata response

    will contain the field `reserved_ips` in addition to the `floating_ips` field.

    Floating IPs retrieved using the Projects API will retain the original name.


    Floating IP actions are commands that can be given to a DigitalOcean

    floating IP. These requests are made on the actions endpoint of a specific

    floating IP.


    An action object is returned. These objects hold the current status of the

    requested action.
- name: Floating IPs
  _type: request_group
  _id: fld_26e005dbbfae4518b88b1343c3730882
  parentId: wrk_a0ac718b171f45d8a0e9bd7c2d05bb37
  description: >-
    As of 16 June 2022, we have renamed the Floating IP product to [Reserved IPs](https://docs.digitalocean.com/reference/api/api-reference/#tag/Reserved-IPs).

    The Reserved IP product's endpoints function the exact same way as Floating IPs.

    The only difference is the name change throughout the URLs and fields.

    For example, the `floating_ips` field is now the `reserved_ips` field.

    The Floating IP endpoints will remain active until fall 2023 before being

    permanently deprecated.


    With the exception of the [Projects API](https://docs.digitalocean.com/reference/api/api-reference/#tag/Projects),

    we will reflect this change as an additional field in the responses across the API

    where the `floating_ip` field is used. For example, the Droplet metadata response

    will contain the field `reserved_ips` in addition to the `floating_ips` field.

    Floating IPs retrieved using the Projects API will retain the original name.


    [DigitalOcean Floating IPs](https://www.digitalocean.com/docs/networking/floating-ips/)

    are publicly-accessible static IP addresses that can be mapped to one of

    your Droplets. They can be used to create highly available setups or other

    configurations requiring movable addresses.


    Floating IPs are bound to a specific region.
- name: Functions
  _type: request_group
  _id: fld_0039790da8274be6900bdf40ce8cc961
  parentId: wrk_a0ac718b171f45d8a0e9bd7c2d05bb37
  description: >-
    [Serverless functions](https://docs.digitalocean.com/products/functions) are blocks of code that run on demand without the need to manage any infrastructure.

    You can develop functions on your local machine and then deploy them to a namespace using `doctl`, the [official DigitalOcean CLI tool](https://docs.digitalocean.com/reference/doctl).


    The Serverless Functions API currently only supports creating and managing namespaces.
- name: Image Actions
  _type: request_group
  _id: fld_92a1f67ed53a434180962806c7794b48
  parentId: wrk_a0ac718b171f45d8a0e9bd7c2d05bb37
  description: >-
    Image actions are commands that can be given to a DigitalOcean image. In

    general, these requests are made on the actions endpoint of a specific

    image.


    An image action object is returned. These objects hold the current status

    of the requested action.
- name: Images
  _type: request_group
  _id: fld_d9d390d630a8422cbd54c2294919833e
  parentId: wrk_a0ac718b171f45d8a0e9bd7c2d05bb37
  description: >-
    A DigitalOcean [image](https://www.digitalocean.com/docs/images/) can be

    used to create a Droplet and may come in a number of flavors. Currently,

    there are five types of images: snapshots, backups, applications,

    distributions, and custom images.


    * [Snapshots](https://www.digitalocean.com/docs/images/snapshots/) provide

    a full copy of an existing Droplet instance taken on demand.


    * [Backups](https://www.digitalocean.com/docs/images/backups/) are similar

    to snapshots but are created automatically at regular intervals when

    enabled for a Droplet.


    * [Custom images](https://www.digitalocean.com/docs/images/custom-images/)

    are Linux-based virtual machine images (raw, qcow2, vhdx, vdi, and vmdk

    formats are supported) that you may upload for use on DigitalOcean.


    * Distributions are the public Linux distributions that are available to

    be used as a base to create Droplets.


    * Applications, or [1-Click Apps](https://www.digitalocean.com/docs/one-clicks/),

    are distributions pre-configured with additional software.


    To interact with images, you will generally send requests to the images

    endpoint at /v2/images.
- name: Kubernetes
  _type: request_group
  _id: fld_e5a15a63acb44b1e9b08307c191f99c2
  parentId: wrk_a0ac718b171f45d8a0e9bd7c2d05bb37
  description: >-
    [DigitalOcean Kubernetes](https://www.digitalocean.com/docs/kubernetes/)

    allows you to quickly deploy scalable and secure Kubernetes clusters. By

    sending requests to the `/v2/kubernetes/clusters` endpoint, you can list,

    create, or delete clusters as well as scale node pools up and down,

    recycle individual nodes, and retrieve the kubeconfig file for use with

    a cluster.
- name: Load Balancers
  _type: request_group
  _id: fld_e79ac5e13f1747ea8e2bd31b0bb26ace
  parentId: wrk_a0ac718b171f45d8a0e9bd7c2d05bb37
  description: >-
    [DigitalOcean Load Balancers](https://www.digitalocean.com/docs/networking/load-balancers/)

    provide a way to distribute traffic across multiple Droplets. By sending

    requests to the `/v2/load_balancers` endpoint, you can list, create, or

    delete load balancers as well as add or remove Droplets, forwarding rules,

    and other configuration details.
- name: Monitoring
  _type: request_group
  _id: fld_b74b474f79a84e1299bb4605dd00022b
  parentId: wrk_a0ac718b171f45d8a0e9bd7c2d05bb37
  description: >-
    The DigitalOcean Monitoring API makes it possible to programmatically retrieve metrics as well as configure alert

    policies based on these metrics. The Monitoring API can help you gain insight into how your apps are performing

    and consuming resources.
- name: Project Resources
  _type: request_group
  _id: fld_b7a497105ae94a3aa3564d27ac7e6ec8
  parentId: wrk_a0ac718b171f45d8a0e9bd7c2d05bb37
  description: >-
    Project Resources are resources that can be grouped into your projects.

    You can group resources (like Droplets, Spaces, load balancers, domains,

    and floating IPs) in ways that align with the applications you host on

    DigitalOcean.


    ### Supported Resource Types Examples


    Projects resources are identified by uniform resource names or URNs. A

    valid URN has the following format: `do:resource_type:resource_id`. The

    following resource types are supported:


    Resource Type      | Example URN

    -------------------|------------

    App Platform App   | `do:app:be5aab85-851b-4cab-b2ed-98d5a63ba4e8`

    Database           | `do:dbaas:83c7a55f-0d84-4760-9245-aba076ec2fb2`

    Domain             | `do:domain:example.com`

    Droplet            | `do:droplet:4126873`

    Floating IP        | `do:floatingip:192.168.99.100`

    Kubernetes Cluster | `do:kubernetes:bd5f5959-5e1e-4205-a714-a914373942af`

    Load Balancer      | `do:loadbalancer:39052d89-8dd4-4d49-8d5a-3c3b6b365b5b`

    Space              | `do:space:my-website-assets`

    Volume             | `do:volume:6fc4c277-ea5c-448a-93cd-dd496cfef71f`


    ### Resource Status Codes


    When assigning and retrieving resources in projects, a `status` attribute

    is returned that indicates if a resource was successfully retrieved or

    assigned. The status codes can be one of the following:


    Status Code        | Explanation

    -------------------|------------

    `ok`               | There was no problem retrieving or assigning a resource.

    `not_found`        | The resource was not found.

    `assigned`         | The resource was successfully assigned.

    `already_assigned` | The resource was already assigned.

    `service_down`     | There was a problem retrieving or assigning a resource. Please try again.

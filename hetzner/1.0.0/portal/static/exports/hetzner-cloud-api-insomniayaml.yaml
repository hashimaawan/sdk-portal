- name: Get a Volume
  method: GET
  url: https://api.hetzner.cloud/v1/volumes/{id}
  authentication: {}
  _type: request
  _id: req_b0374a30bbc2454f9367d5d04ff17a0c
  parentId: fld_8865dec9be344fe2ad72b9b7f94d0eb4
  description: Gets a specific Volume object.
- name: Update a Volume
  method: PUT
  url: https://api.hetzner.cloud/v1/volumes/{id}
  body:
    mimeType: application/json
    text: >-
      {
        "name": "database-storage",
        "labels": {
          "labelkey": "value"
        }
      }
  headers:
  - name: Content-Type
    value: application/json
    disabled: false
  authentication: {}
  _type: request
  _id: req_229de6edc0df44db8524535c8c17bc31
  parentId: fld_8865dec9be344fe2ad72b9b7f94d0eb4
  description: >
    Updates the Volume properties.


    Note that when updating labels, the volume’s current set of labels will be replaced with the labels provided in the request body. So, for example, if you want to add a new label, you have to provide all existing labels plus the new label in the request body.
- name: Get all Actions for a Volume
  method: GET
  url: https://api.hetzner.cloud/v1/volumes/{id}/actions
  parameters:
  - name: sort
    value: progress:desc
    disabled: false
  - name: status
    value: success
    disabled: false
  authentication: {}
  _type: request
  _id: req_0ea3a1e068ed4be4ab63f972d2264202
  parentId: fld_80591f5d16d5435e8d146445b0809efa
  description: Returns all Action objects for a Volume. You can `sort` the results by using the sort URI parameter, and filter them with the `status` parameter.
- name: Attach Volume to a Server
  method: POST
  url: https://api.hetzner.cloud/v1/volumes/{id}/actions/attach
  body:
    mimeType: application/json
    text: >-
      {
        "server": 43,
        "automount": false
      }
  headers:
  - name: Content-Type
    value: application/json
    disabled: false
  authentication: {}
  _type: request
  _id: req_59b76b37c6e949549d0c61e13667db8a
  parentId: fld_80591f5d16d5435e8d146445b0809efa
  description: Attaches a Volume to a Server. Works only if the Server is in the same Location as the Volume.
- name: Change Volume Protection
  method: POST
  url: https://api.hetzner.cloud/v1/volumes/{id}/actions/change_protection
  body:
    mimeType: application/json
    text: >-
      {
        "delete": true
      }
  headers:
  - name: Content-Type
    value: application/json
    disabled: false
  authentication: {}
  _type: request
  _id: req_bd2760e8923d43d58ce079cb813e6cbc
  parentId: fld_80591f5d16d5435e8d146445b0809efa
  description: Changes the protection configuration of a Volume.
- name: Detach Volume
  method: POST
  url: https://api.hetzner.cloud/v1/volumes/{id}/actions/detach
  authentication: {}
  _type: request
  _id: req_c8220624fcab4c4b9fa7cccb5bca9827
  parentId: fld_80591f5d16d5435e8d146445b0809efa
  description: Detaches a Volume from the Server it’s attached to. You may attach it to a Server again at a later time.
- name: Resize Volume
  method: POST
  url: https://api.hetzner.cloud/v1/volumes/{id}/actions/resize
  body:
    mimeType: application/json
    text: >-
      {
        "size": 50
      }
  headers:
  - name: Content-Type
    value: application/json
    disabled: false
  authentication: {}
  _type: request
  _id: req_fd8b570188444ed38b7df6334ea73c1d
  parentId: fld_80591f5d16d5435e8d146445b0809efa
  description: Changes the size of a Volume. Note that downsizing a Volume is not possible.
- name: Get an Action for a Volume
  method: GET
  url: https://api.hetzner.cloud/v1/volumes/{id}/actions/{action_id}
  authentication: {}
  _type: request
  _id: req_6650aa1f38d042148aa29fa0cd7d707e
  parentId: fld_80591f5d16d5435e8d146445b0809efa
  description: Returns a specific Action for a Volume.

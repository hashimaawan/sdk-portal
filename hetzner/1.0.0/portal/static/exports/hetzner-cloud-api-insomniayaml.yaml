- name: Create a Volume
  method: POST
  url: https://api.hetzner.cloud/v1/volumes
  body:
    mimeType: application/json
    text: '{"automount":false,"format":"xfs","labels":{"labelkey":"value"},"location":"nbg1","name":"test-database","size":42}'
  headers:

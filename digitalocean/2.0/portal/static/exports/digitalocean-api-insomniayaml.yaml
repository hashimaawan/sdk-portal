- name: uptime_alert_update
  method: PUT
  url: https://api.digitalocean.com/v2/uptime/checks/{check_id}/alerts/{alert_id}
  body:
    mimeType: application/json
    text: >-
      {
        "comparison": "greater_than",
        "name": "Landing page degraded performance",
        "notifications": {
          "email": [
            "bob@example.com"
          ],
          "slack": [
            {
              "channel": "Production Alerts",
              "url": "https://hooks.slack.com/services/T1234567/AAAAAAAA/ZZZZZZ"
            }
          ]
        },
        "period": "2m",
        "threshold": 300,
        "type": "latency"
      }
  headers:
  - name: Content-Type
    value: application/json
    disabled: false
  authentication:
    type: bearer
  _type: request
  _id: req_e2d468c970094f36abcd7ff7783a290c
  parentId: fld_54f6c8afdd944fd7b7b89d0caee7c089
  description: >
    To update the settings of an Uptime alert, send a PUT request to `/v2/uptime/checks/$CHECK_ID/alerts/$ALERT_ID`.

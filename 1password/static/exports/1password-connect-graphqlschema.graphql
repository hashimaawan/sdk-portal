# API Name: "1Password Connect"
# Host: http://1password.local
# REST API interface for 1Password Connect.

enum Action {
    CREATE
    DELETE
    READ
    UPDATE
}

enum Category {
    API_CREDENTIAL
    BANK_ACCOUNT
    CREDIT_CARD
    CUSTOM
    DATABASE
    DOCUMENT
    DRIVER_LICENSE
    EMAIL_ACCOUNT
    IDENTITY
    LOGIN
    MEDICAL_RECORD
    MEMBERSHIP
    OUTDOOR_LICENSE
    PASSPORT
    PASSWORD
    REWARD_PROGRAM
    SECURE_NOTE
    SERVER
    SOCIAL_SECURITY_NUMBER
    SOFTWARE_LICENSE
    SSH_KEY
    WIRELESS_ROUTER
}

enum CharacterSet {
    DIGITS
    LETTERS
    SYMBOLS
}

enum Op {
    ADD
    REMOVE
    REPLACE
}

"Some item types, Login and Password, have fields used for autofill. This property indicates that purpose and is required for some item types."
enum Purpose {
    NOTES
    PASSWORD
    USERNAME
}

enum Result {
    DENY
    SUCCESS
}

enum State {
    ARCHIVED
    DELETED
}

enum Type {
    ITEM
    VAULT
}

enum Type1 {
    CONCEALED
    DATE
    EMAIL
    MENU
    MONTH_YEAR
    STRING
    TOTP
    URL
}

enum Type2 {
    EVERYONE
    PERSONAL
    TRANSFER
    USER_CREATED
}

"Represents a request that was made to the API. Including what Token was used and what resource was accessed."
type APIRequest {
    action: Action!
    actor: Actor!
    "The unique id used to identify a single request."
    requestId: ID!
    resource: Resource!
    result: Result!
    "The time at which the request was processed by the server."
    timestamp: String!
}

type ErrorResponse {
    "A message detailing the error"
    message: String!
    "HTTP Status Code"
    status: Int!
}

type Field {
    "For fields with a purpose of `PASSWORD` this is the entropy of the value"
    entropy: Float!
    "If value is not present then a new value should be generated for this field"
    generate: Boolean!
    id: String!
    label: String!
    "Some item types, Login and Password, have fields used for autofill. This property indicates that purpose and is required for some item types."
    purpose: Purpose!
    "The recipe is used in conjunction with the \"generate\" property to set the character set used to generate a new secure value"
    recipe: GeneratorRecipe!
    section: Section!
    type: Type1!
    value: String!
}

type File {
    "Base64-encoded contents of the file. Only set if size <= OP_MAX_INLINE_FILE_SIZE_KB kb and `inline_files` is set to `true`."
    content: String!
    "Path of the Connect API that can be used to download the contents of this file."
    contentPath: String!
    "ID of the file"
    id: String!
    "Name of the file"
    name: String!
    "For files that are in a section, this field describes the section."
    section: Section1!
    "Size in bytes of the file"
    size: Int!
}

type FullItem {
    category: Category!
    createdAt: String!
    favorite: Boolean!
    id: String!
    lastEditedBy: String!
    state: State!
    tags: [String!]
    title: String!
    updatedAt: String!
    urls: [Url!]
    vault: Vault1!
    version: Int!
    fields: [Field!]
    files: [File!]
    sections: [Section2!]
}

"The recipe is used in conjunction with the \"generate\" property to set the character set used to generate a new secure value"
type GeneratorRecipe {
    characterSets: [CharacterSet!]
    "List of all characters that should be excluded from generated passwords."
    excludeCharacters: String!
    "Length of the generated value"
    length: Int!
}

type Item {
    category: Category!
    createdAt: String!
    favorite: Boolean!
    id: String!
    lastEditedBy: String!
    state: State!
    tags: [String!]
    title: String!
    updatedAt: String!
    urls: [Url!]
    vault: Vault1!
    version: Int!
}

"The state of a registered server dependency."
type ServiceDependency {
    "Human-readable message for explaining the current state."
    message: String!
    service: String!
    status: String!
}

type Vault {
    "The vault version"
    attributeVersion: Int!
    "The version of the vault contents"
    contentVersion: Int!
    createdAt: String!
    description: String!
    id: String!
    "Number of active items in the vault"
    items: Int!
    name: String!
    type: Type2!
    updatedAt: String!
}

type Actor {
    account: String!
    id: ID!
    jti: String!
    requestIp: String!
    userAgent: String!
}

type HealthResponse {
    dependencies: [ServiceDependency!]
    name: String!
    "The Connect server's version"
    version: String!
}

type Item2 {
    id: String!
}

type Patch {
    op: Op!
    "An RFC6901 JSON Pointer pointing to the Item document, an Item Attribute, and Item Field by Field ID, or an Item Field Attribute"
    path: String!
    value: String!
}

type Resource {
    item: Item2!
    itemVersion: Int!
    type: Type!
    vault: Vault3!
}

type Section {
    id: String!
}

"For files that are in a section, this field describes the section."
type Section1 {
    id: String!
}

type Section2 {
    id: String!
    label: String!
}

type Url {
    href: String!
    label: String!
    primary: Boolean!
}

type Vault1 {
    id: String!
}

type Vault3 {
    id: String!
}

input GetVaultItemsInput {
    "The UUID of the Vault to fetch Items from"
    vaultUuid: String!
    "Filter the Item collection based on Item name using SCIM eq filter"
    filter: String!
}

input UrlInput {
    href: String!
    label: String!
    primary: Boolean!
}

input Vault1Input {
    id: String!
}

"The recipe is used in conjunction with the \"generate\" property to set the character set used to generate a new secure value"
input GeneratorRecipeInput {
    characterSets: [CharacterSet!]
    "List of all characters that should be excluded from generated passwords."
    excludeCharacters: String!
    "Length of the generated value"
    length: Int!
}

input SectionInput {
    id: String!
}

input FieldInput {
    "For fields with a purpose of `PASSWORD` this is the entropy of the value"
    entropy: Float!
    "If value is not present then a new value should be generated for this field"
    generate: Boolean!
    id: String!
    label: String!
    "Some item types, Login and Password, have fields used for autofill. This property indicates that purpose and is required for some item types."
    purpose: Purpose!
    "The recipe is used in conjunction with the \"generate\" property to set the character set used to generate a new secure value"
    recipe: GeneratorRecipeInput!
    section: SectionInput!
    type: Type1!
    value: String!
}

"For files that are in a section, this field describes the section."
input Section1Input {
    id: String!
}

input FileInput {
    "Base64-encoded contents of the file. Only set if size <= OP_MAX_INLINE_FILE_SIZE_KB kb and `inline_files` is set to `true`."
    content: String!
    "Path of the Connect API that can be used to download the contents of this file."
    contentPath: String!
    "ID of the file"
    id: String!
    "Name of the file"
    name: String!
    "For files that are in a section, this field describes the section."
    section: Section1Input!
    "Size in bytes of the file"
    size: Int!
}

input Section2Input {
    id: String!
    label: String!
}

input FullItemInput {
    category: Category!
    createdAt: String!
    favorite: Boolean!
    id: String!
    lastEditedBy: String!
    state: State!
    tags: [String!]
    title: String!
    updatedAt: String!
    urls: [UrlInput!]
    vault: Vault1Input!
    version: Int!
    fields: [FieldInput!]
    files: [FileInput!]
    sections: [Section2Input!]
}

input CreateVaultItemInput {
    "The UUID of the Vault to create an Item in"
    vaultUuid: String!
    contentType: String!
    body: FullItemInput!
}

input DeleteVaultItemInput {
    "The UUID of the Vault the item is in"
    vaultUuid: String!
    "The UUID of the Item to update"
    itemUuid: String!
}

input GetVaultItemByIdInput {
    "The UUID of the Vault to fetch Item from"
    vaultUuid: String!
    "The UUID of the Item to fetch"
    itemUuid: String!
}

input PatchInput {
    op: Op!
    "An RFC6901 JSON Pointer pointing to the Item document, an Item Attribute, and Item Field by Field ID, or an Item Field Attribute"
    path: String!
    value: String!
}

input PatchVaultItemInput {
    "The UUID of the Vault the item is in"
    vaultUuid: String!
    "The UUID of the Item to update"
    itemUuid: String!
    contentType: String!
    body: [PatchInput!]
}

input UpdateVaultItemInput {
    "The UUID of the Item's Vault"
    vaultUuid: String!
    "The UUID of the Item to update"
    itemUuid: String!
    contentType: String!
    body: FullItemInput!
}

input GetVaultsInput {
    "Filter the Vault collection based on Vault name using SCIM eq filter"
    filter: String!
}

input GetVaultByIdInput {
    "The UUID of the Vault to fetch Items from"
    vaultUuid: String!
}

input GetApiActivityInput {
    "How many API Events should be retrieved in a single request."
    limit: Int!
    "How far into the collection of API Events should the response start"
    offset: Int!
}

input GetItemFilesInput {
    "The UUID of the Vault to fetch Items from"
    vaultUuid: ID!
    "The UUID of the Item to fetch files from"
    itemUuid: ID!
    "Tells server to return the base64-encoded file contents in the response."
    inlineFiles: Boolean!
}

input GetDetailsOfFileByIdInput {
    "The UUID of the Vault to fetch Item from"
    vaultUuid: ID!
    "The UUID of the Item to fetch File from"
    itemUuid: ID!
    "The UUID of the File to fetch"
    fileUuid: ID!
    "Tells server to return the base64-encoded file contents in the response."
    inlineFiles: Boolean!
}

input GetDownloadfilebyidInput {
    "The UUID of the Vault the item is in"
    vaultUuid: ID!
    "The UUID of the Item the File is in"
    itemUuid: ID!
    "UUID of the file to get content from"
    fileUuid: String!
}

type Query {
    getVaultItems(input: GetVaultItemsInput!): [Item!]
    getVaultItemById(input: GetVaultItemByIdInput!): FullItem!
    getVaults(input: GetVaultsInput!): [Vault!]
    getVaultById(input: GetVaultByIdInput!): Vault!
    getApiActivity(input: GetApiActivityInput!): [APIRequest!]
    getServerHealth: HealthResponse!
    getHeartbeat: String!
    "See Prometheus documentation for a complete data model."
    getPrometheusMetrics: String!
    getItemFiles(input: GetItemFilesInput!): [File!]
    getDetailsOfFileById(input: GetDetailsOfFileByIdInput!): File!
    getDownloadfilebyid(input: GetDownloadfilebyidInput!): String!
}

type Mutation {
    createVaultItem(input: CreateVaultItemInput!): FullItem!
    deleteVaultItem(input: DeleteVaultItemInput!): String
    "Applies a modified [RFC6902 JSON Patch](https://tools.ietf.org/html/rfc6902) document to an Item or ItemField. This endpoint only supports `add`, `remove` and `replace` operations.\n\nWhen modifying a specific ItemField, the ItemField's ID in the `path` attribute of the operation object: `/fields/{fieldId}`"
    patchVaultItem(input: PatchVaultItemInput!): FullItem!
    updateVaultItem(input: UpdateVaultItemInput!): FullItem!
}

schema {
    mutation: Mutation
    query: Query
}

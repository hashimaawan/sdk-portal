- name: Get Metrics for a Server
  method: GET
  url: https://api.hetzner.cloud/v1/servers/{id}/metrics
  parameters:
  - name: type
    value: disk
    disabled: false
  - name: start
    value: start57
    disabled: false
  - name: end
    value: end2
    disabled: false
  - name: step
    value: step61
    disabled: false

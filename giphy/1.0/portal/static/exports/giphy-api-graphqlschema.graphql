# API Name: "Giphy API"
# Host: https://api.giphy.com/v1
# Giphy API

"Type of the gif. By default, this is almost always gif"
enum Type {
    GIF
}

type Gif {
    "The unique bit.ly URL for this GIF"
    bitlyUrl: String!
    "Currently unused"
    contentUrl: String!
    "The date this GIF was added to the GIPHY database."
    createDatetime: String!
    "A URL used for embedding this GIF"
    embdedUrl: String!
    "An array of featured tags for this GIF (Note: Not available when using the Public Beta Key)"
    featuredTags: [String!]
    "This GIF's unique ID"
    id: String!
    "An object containing data for various available formats and sizes of this GIF."
    images: Images!
    "The creation or upload date from this GIF's source."
    importDatetime: String!
    "The MPAA-style rating for this content. Examples include Y, G, PG, PG-13 and R"
    rating: String!
    "The unique slug used in this GIF's URL"
    slug: String!
    "The page on which this GIF was found"
    source: String!
    "The URL of the webpage on which this GIF was found."
    sourcePostUrl: String!
    "The top level domain of the source URL."
    sourceTld: String!
    "An array of tags for this GIF (Note: Not available when using the Public Beta Key)"
    tags: [String!]
    "The date on which this gif was marked trending, if applicable."
    trendingDatetime: String!
    "Type of the gif. By default, this is almost always gif"
    type: Type!
    "The date on which this GIF was last updated."
    updateDatetime: String!
    "The unique URL for this GIF"
    url: String!
    "The User Object contains information about the user associated with a GIF and URLs to assets such as that user's avatar image, profile, and more."
    user: User!
    "The username this GIF is attached to, if applicable"
    username: String!
}

type Image {
    "The number of frames in this GIF."
    frames: String!
    "The height of this GIF in pixels."
    height: String!
    "The URL for this GIF in .MP4 format."
    mp4: String!
    "The size in bytes of the .MP4 file corresponding to this GIF."
    mp4Size: String!
    "The size of this GIF in bytes."
    size: String!
    "The publicly-accessible direct URL for this GIF."
    url: String!
    "The URL for this GIF in .webp format."
    webp: String!
    "The size in bytes of the .webp file corresponding to this GIF."
    webpSize: String!
    "The width of this GIF in pixels."
    width: String!
}

"The Meta Object contains basic information regarding the request, whether it was successful, and the response given by the API.  Check `responses` to see a description of types of response codes the API might give you under different cirumstances."
type Meta {
    "HTTP Response Message"
    msg: String!
    "A unique ID paired with this response from the API."
    responseId: String!
    "HTTP Response Code"
    status: Int!
}

"The Pagination Object contains information relating to the number of total results available as well as the number of results fetched and their relative positions."
type Pagination {
    "Total number of items returned."
    count: Int!
    "Position in pagination."
    offset: Int!
    "Total number of items available."
    totalCount: Int!
}

"The User Object contains information about the user associated with a GIF and URLs to assets such as that user's avatar image, profile, and more."
type User {
    "The URL for this user's avatar image."
    avatarUrl: String!
    "The URL for the banner image that appears atop this user's profile page."
    bannerUrl: String!
    "The display name associated with this user (contains formatting the base username might not)."
    displayName: String!
    "The URL for this user's profile."
    profileUrl: String!
    "The Twitter username associated with this user, if applicable."
    twitter: String!
    "The username associated with this user."
    username: String!
}

type GifsRandomResponse {
    data: Gif!
    "The Meta Object contains basic information regarding the request, whether it was successful, and the response given by the API.  Check `responses` to see a description of types of response codes the API might give you under different cirumstances."
    meta: Meta!
}


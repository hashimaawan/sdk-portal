- name: Change IP range of a Network
  method: POST
  url: https://api.hetzner.cloud/v1/networks/{id}/actions/change_ip_range
  body:
    mimeType: application/json
    text: >-
      {
        "ip_range": "10.0.0.0/12"
      }
  headers:
  - name: Content-Type
    value: application/json
    disabled: false

_type: export
__export_format: 4
__export_source: apimatic.transformer
resources:
- name: Furkot Trips
  _type: workspace
  _id: wrk_eb96d4d2d05147f1b75d348a273597fc
  description: >
    Furkot provides Rest API to access user trip data.

    Using Furkot API an application can list user trips and display stops for a specific trip.

    Furkot API uses OAuth2 protocol to authorize applications to access data on behalf of users.
- name: production
  data:
    default: https://trips.furkot.com/pub/api
    authserver: https://trips.furkot.com/oauth
  _type: environment
  _id: env_89d2f2b3c21c481491bc4c664673f92c
  parentId: wrk_eb96d4d2d05147f1b75d348a273597fc
- name: Trip_GET
  method: GET
  url: '{{default}}/trip'
  authentication:
    type: oauth2
    accessTokenUrl: https://trips.furkot.com/pub/api/access_token
    authorizationUrl: https://trips.furkot.com/oauth/authorize
    grantType: authorization_code
  _type: request
  _id: req_4f8193fd40104451a64e69153de3ecd7
  parentId: wrk_eb96d4d2d05147f1b75d348a273597fc
  description: list user's trips
- name: TripStopByTripId_GET
  method: GET
  url: '{{default}}/trip/{trip_id}/stop'
  authentication:
    type: oauth2
    accessTokenUrl: https://trips.furkot.com/pub/api/access_token
    authorizationUrl: https://trips.furkot.com/oauth/authorize
    grantType: authorization_code
  _type: request
  _id: req_3f07ce7829a2435e84e60caf3f138aa0
  parentId: wrk_eb96d4d2d05147f1b75d348a273597fc
  description: list stops for a trip identified by {trip_id}

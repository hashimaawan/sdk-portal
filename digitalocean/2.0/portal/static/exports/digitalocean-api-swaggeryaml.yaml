        example: 2
        type: integer
        format: int32
      running_steps:
        example: 2
        type: integer
        format: int32
      steps:
        type: array
        items:
          $ref: '#/definitions/Astepthatisrunaspartofthedeployment%27slifecycle'
      success_steps:
        example: 4
        type: integer
        format: int32
      summary_steps:
        type: array
        items:
          $ref: '#/definitions/Astepthatisrunaspartofthedeployment%27slifecycle'
      total_steps:
        example: 5
        type: integer
        format: int32
  Astepthatisrunaspartofthedeployment'slifecycle:
    title: Astepthatisrunaspartofthedeployment'slifecycle
    type: object

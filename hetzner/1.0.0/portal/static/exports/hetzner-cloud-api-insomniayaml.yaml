- name: Create a Certificate
  method: POST
  url: https://api.hetzner.cloud/v1/certificates
  body:
    mimeType: application/json
    text: '{"domain_names":["example.com","webmail.example.com","www.example.com"],"name":"my website cert","type":"managed"}'
  headers:
  - name: Content-Type
    value: application/json
    disabled: false

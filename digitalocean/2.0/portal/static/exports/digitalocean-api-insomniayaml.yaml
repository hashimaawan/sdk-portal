        "description": "VPC for production environment",
        "name": "env.prod-vpc",
        "default": true
      }
  headers:
  - name: Content-Type
    value: application/json
    disabled: false
  authentication:
    type: bearer
  _type: request
  _id: req_54ba62732c904eba8f52cc8bab3c78cc
  parentId: fld_3afecd43328542ae89acc9b1f3e06daa
  description: >
    To update a subset of information about a VPC, send a PATCH request to

    `/v2/vpcs/$VPC_ID`.
- name: vpcs_update
  method: PUT
  url: https://api.digitalocean.com/v2/vpcs/{vpc_id}

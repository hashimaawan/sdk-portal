swagger: '2.0'
info:
  version: '1.0'
  title: Giphy API
  description: Giphy API
  contact:
    email: support@giphy.com
host: api.giphy.com
basePath: /v1
securityDefinitions:
  api_key:
    type: apiKey
    name: api_key
    in: query
schemes:
- https
consumes:
- application/json
produces:
- application/json
paths:
  /gifs:
    get:
      description: >
        A multiget version of the get GIF by ID endpoint.
      summary: getGifsById
      tags:
      - gifs
      operationId: getGifsById
      deprecated: false
      produces:
      - application/json
      parameters:
      - name: ids
        in: query
        required: false
        type: string
        description: Filters results by specified GIF IDs, separated by commas.
      responses:
        '200':
          description: ''
          schema:
            $ref: '#/definitions/GifsResponse'
          headers: {}
        '400':
          description: Your request was formatted incorrectly or missing required parameters.
          headers: {}
        '403':
          description: You weren't authorized to make your request; most likely this indicates an issue with your API Key.
          headers: {}
        '404':
          description: The particular GIF you are requesting was not found. This occurs, for example, if you request a GIF by an id that does not exist.
          headers: {}
        '429':
          description: Your API Key is making too many requests. Read about [requesting a Production Key](https://developers.giphy.com/docs/#access) to upgrade your API Key rate limits.
          headers: {}
  /gifs/random:
    get:
      description: >
        Returns a random GIF, limited by tag. Excluding the tag parameter will return a random GIF from the GIPHY catalog.
      summary: randomGif
      tags:
      - gifs
      operationId: randomGif
      deprecated: false
      produces:
      - application/json
      parameters:
      - name: tag
        in: query
        required: false
        type: string
        description: Filters results by specified tag.
      - name: rating
        in: query
        required: false
        type: string
        description: Filters results by specified rating.
      responses:
        '200':
          description: ''
          schema:
            $ref: '#/definitions/GifsRandomResponse'
          headers: {}
        '400':
          description: Your request was formatted incorrectly or missing required parameters.
          headers: {}
        '403':
          description: You weren't authorized to make your request; most likely this indicates an issue with your API Key.
          headers: {}
        '404':
          description: The particular GIF you are requesting was not found. This occurs, for example, if you request a GIF by an id that does not exist.
          headers: {}
        '429':
          description: Your API Key is making too many requests. Read about [requesting a Production Key](https://developers.giphy.com/docs/#access) to upgrade your API Key rate limits.
          headers: {}
  /gifs/search:
    get:
      description: >
        Search all GIPHY GIFs for a word or phrase. Punctuation will be stripped and ignored.  Use a plus or url encode for phrases. Example paul+rudd, ryan+gosling or american+psycho.
      summary: searchGifs
      tags:
      - gifs
      operationId: searchGifs
      deprecated: false
      produces:
      - application/json
      parameters:
      - name: q
        in: query
        required: true
        type: string
        description: Search query term or prhase.
      - name: limit
        in: query
        required: false
        default: 25
        type: integer
        format: int32
        description: The maximum number of records to return.
      - name: offset
        in: query
        required: false
        default: 0
        type: integer
        format: int32
        description: An optional results offset.
      - name: rating
        in: query
        required: false
        type: string
        description: Filters results by specified rating.
      - name: lang
        in: query
        required: false
        type: string
        description: Specify default language for regional content; use a 2-letter ISO 639-1 language code.
      responses:
        '200':
          description: Search results
          schema:
            $ref: '#/definitions/GifsSearchResponse'
          headers: {}
        '400':
          description: Your request was formatted incorrectly or missing required parameters.
          headers: {}
        '403':
          description: You weren't authorized to make your request; most likely this indicates an issue with your API Key.
          headers: {}
        '404':
          description: The particular GIF you are requesting was not found. This occurs, for example, if you request a GIF by an id that does not exist.
          headers: {}
        '429':
          description: Your API Key is making too many requests. Read about [requesting a Production Key](https://developers.giphy.com/docs/#access) to upgrade your API Key rate limits.
          headers: {}
  /gifs/translate:
    get:
      description: >
        The translate API draws on search, but uses the GIPHY `special sauce` to handle translating from one vocabulary to another. In this case, words and phrases to GIF
      summary: translateGif
      tags:
      - gifs
      operationId: translateGif
      deprecated: false

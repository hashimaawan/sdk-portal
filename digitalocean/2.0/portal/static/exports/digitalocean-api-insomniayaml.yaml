  _id: req_bafdbf302f8148d4b66e2aab2ecde49c
  parentId: fld_3afecd43328542ae89acc9b1f3e06daa
  description: >
    To update information about a VPC, send a PUT request to `/v2/vpcs/$VPC_ID`.
- name: vpcs_list_members
  method: GET
  url: https://api.digitalocean.com/v2/vpcs/{vpc_id}/members
  parameters:
  - name: resource_type
    value: droplet
    disabled: false
  - name: per_page
    value: '20'
    disabled: false
  - name: page
    value: '1'
    disabled: false
  authentication:
    type: bearer
  _type: request
  _id: req_fde49faa76154046b2e1b1a98dbb0ad5
  parentId: fld_3afecd43328542ae89acc9b1f3e06daa
  description: >
    To list all of the resources that are members of a VPC, send a GET request to

    `/v2/vpcs/$VPC_ID/members`.


    To only list resources of a specific type that are members of the VPC,

    included a `resource_type` query parameter. For example, to only list Droplets

    in the VPC, send a GET request to `/v2/vpcs/$VPC_ID/members?resource_type=droplet`.
